<!DOCTYPE html>
<html>
<head>
    <title>Empresa - Buscar Candidatos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body style="background-color:#080f15; min-height:100vh; display:flex; flex-direction:column;">
<main class="flex-grow-1">
    <div class="container-fluid px-3 mt-4">
        <div class="d-flex align-items-center mb-3">
            <h5 class="text-white">
                Buscar candidatos
            </h5>
            <a href="MisPuestos.html"
               class="btn ms-auto"
               style="background-color:#2e3e3e; color:white;">
                <i class="fa-solid fa-arrow-left me-1"></i>
                Volver
            </a>
        </div>
        <div class="card mb-3"
             style="background-color:rgb(35,46,46); border-color:#4a5f5f;">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label
                                style="color:#8aa8a8; font-size:0.8rem; text-transform:uppercase;"
                                class="mb-1 d-block">
                            Característica
                        </label>
                        <select class="form-select"
                                style="background-color:#0e1a22; border:1px solid #4a5f5f; color:#cdd9d9;">
                            <option value="">Seleccione</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label style="color:#8aa8a8; font-size:0.8rem; text-transform:uppercase;" class="mb-1 d-block"> Nivel minimo</label>
                        <input type="number" class="form-control" min="1" max="5" style="background-color:#0e1a22; border:1px solid #4a5f5f; color:#cdd9d9;">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn w-100" style="background-color:rgb(10,202,154); color:#080f15; font-weight:700;"><i class="fa-solid fa-search me-1"></i> Buscar</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card"
             style="background-color:rgb(35,46,46); border-color:#4a5f5f;">
            <div class="card-body">
                <table class="table table-borderless mb-0" style="color:#cdd9d9; font-size:0.9rem;">
                    <thead>
                    <tr style="border-bottom:1px solid #4a5f5f;">
                        <th style="color:rgb(10,202,154)">Nombre</th>
                        <th style="color:rgb(10,202,154)">Correo</th>
                        <th style="color:rgb(10,202,154)">Telefono</th>
                        <th class="text-center" style="color:rgb(10,202,154)">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<footer class="py-2" style="background-color: rgb(36,47,47);">
    <div class="d-flex align-items-center px-3">
        <div class="d-flex align-items-center gap-2">
            <i class="fa-solid fa-briefcase text-white"></i>
            <span class="text-white fw-bold">Bolsa de Empleo</span>
        </div>
        <div class="ms-auto text-end">
            <div class="text-white-50" style="font-size:0.85rem;">
                <a href="mailto:jozabad.mejia.esquivel@est.una.ac.cr">
                    jozabad.mejia.esquivel@est.una.ac.cr
                </a>
            </div>
            <div class="text-white-50" style="font-size:0.85rem;">
                <a href="mailto:hernan.sanchez.chavez@est.una.ac.cr">hernan.sanchez.chavez@est.una.ac.cr</a>
            </div>
            <div class="text-white-50" style="font-size:0.85rem;">
                Créditos: Jozabad Mejía y Hernán Sánchez
            </div>
        </div>
    </div>
</footer>
</body>
</html>
