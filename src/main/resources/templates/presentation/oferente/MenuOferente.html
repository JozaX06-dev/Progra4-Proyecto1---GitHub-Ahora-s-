<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <!-- Este head se usa en todas las páginas-->
        <title>Menu Oferente</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    </head>
    <body style="background-color: #080f15; min-height: 100vh; display: flex; flex-direction: column;">
        <!-- Navegador -->
        <nav style="background-color: rgb(35, 46, 46);">
            <ul class="nav nav-tabs w-100">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/oferente/MenuOferente}">
                    <i class="fa-solid fa-briefcase" style="color:rgb(10, 202, 154)"></i>
                </a>
            </li>
            <li class="nav-item">
                <span class="nav-link fw-bold" style="color:rgb(10, 202, 154)">Bolsa de Empleo</span>
            </li>
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" th:href="@{/oferente/MenuOferente}" style="color:rgb(10, 202, 154)">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/oferente/MisHabilidades}" style="color:rgb(10, 202, 154)">Mis Habilidades</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/...}" style="color:rgb(10, 202, 154)">Mi CV</a>
            </li>
            <li class="nav-item ms-auto">
                <span class="nav-link" th:text="${oferente.nombre}+' '+${oferente.apellido}" style="color:rgb(10,202,154)"></span>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/salir}" style="color:rgb(10, 202, 154)">Salir</a>
            </li>
            </ul>
        </nav>
        <main class="flex-grow-1 d-flex align-items-center justify-content-center">
            <div class="my-4 text-center">
                <h3 class="text-white">Oferente - Dashboard</h3>
                <p class="text-white-50">Administra tus habilidades y tu CV</p>
                <div class="d-flex gap-3 justify-content-center">
                    <a th:href="@{/oferente/MisHabilidades}" class="btn px-4" style="background-color:rgb(10,202,154); color:#080f15; font-weight:600;">Mis habilidades</a>
                    <a th:href="@{/oferente/MiCV}" class="btn px-4" style="background-color:rgb(10,202,154); color:#080f15; font-weight:600;">Mi CV</a>
                </div>
            </div>
        </main>
        <!-- Footer -->
        <footer class="py-2" style="background-color: rgb(36, 47, 47);">
            <div class="d-flex align-items-center px-3">
                <div class="d-flex align-items-center gap-2">
                    <i class="fa-solid fa-briefcase text-white"></i>
                    <span class="text-white fw-bold">Bolsa de Empleo</span>
                </div>
                <div class="ms-auto text-end">
                    <div class="text-white-50" style="font-size: 0.85rem;">
                        <a href="mailto:jozabad.mejia.esquivel@est.una.ac.cr">
                            jozabad.mejia.esquivel@est.una.ac.cr
                        </a>
                    </div>
                    <div class="text-white-50" style="font-size: 0.85rem;">
                        <a href="mailto:jozabad.mejia.esquivel@est.una.ac.cr">
                            hernan.sanchez.chavez@est.una.ac.cr
                        </a>
                    </div>
                    <div class="text-white-50" style="font-size: 0.85rem;">Créditos: Jozabad Mejía y Hernán Sánchez</div>
                </div>
            </div>
        </footer>
    </body>
</html>
